name: ci

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn -B clean package -DskipTests
      - run: mvn -B test
      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar
  integration-test:
    name: Integration test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start MongoDB
        run: docker run -d --name mongo -p 27017:27017 mongo:7

      - name: Wait MongoDB
        run: |
          for i in {1..30}; do
            nc -z localhost 27017 && echo "Mongo ready" && exit 0
            sleep 1
          done
          echo "Mongo not ready"
          exit 1

      - name: Run integration tests
        run: mvn -B verify
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/Catalog

      - name: Cleanup
        if: always()
        run: |
          docker stop mongo || true
          docker rm mongo || true
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jar
          path: target
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ github.sha }}
  test-container:
    name: Test Container
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker network create ci
      - run: docker run -d --name mongo --network ci -p 27017:27017 mongo:7
      - run: |
          for i in {1..30}; do
            nc -z localhost 27017 && echo "Mongo up" && exit 0
            sleep 1
          done
          echo "Mongo not ready"
          exit 1
      - run: |
          docker run -d --name app \
            --network ci \
            -p 8083:8083 \
            -e SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/Catalog \
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ github.sha }}
      - run: |
          for i in {1..40}; do
            RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8083/actuator/health || true)
            BODY=$(echo "$RESPONSE" | head -n1)
            CODE=$(echo "$RESPONSE" | tail -n1)

            echo "HTTP=$CODE"
            echo "BODY=$BODY"

            if [ "$CODE" = "200" ]; then
              echo "HTTP 200"
              exit 0
            fi

            sleep 2
          done

          echo "Health check failed"
          docker logs app
          exit 1
      - run: docker logs app
        if: failure()
      - run: |
          docker stop app mongo || true
          docker rm app mongo || true
          docker network rm ci || true
        if: always()
