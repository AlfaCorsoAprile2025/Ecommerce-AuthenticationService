server:
  port: 8083

spring:
  application:
    name: auth-service

  # ===== MongoDB Reactive =====
  data:
    mongodb:
      host: ${MONGO_HOST:riqualificazioneamati2026-storage}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DB:Authentication}
      username: ${MONGO_USER:admin}
      password: ${MONGO_PASSWORD:password}
      authentication-database: admin

  # ===== R2DBC / H2 (user_roles — RBAC) =====
  # DB_CLOSE_DELAY=-1 mantiene il DB in-memory vivo per tutta la JVM
  r2dbc:
    url: r2dbc:h2:mem:///authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  sql:
    init:
      mode: always

  # ===== RabbitMQ =====
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host:  /
#sbibs
# ===== JWT Configuration =====
# Due chiavi separate: una per tempToken (OTP flow) e una per il JWT finale.
# Il tempToken ha TTL corto per limitare la finestra d'attacco.
jwt:
  # Chiave segreta per JWT definitivo (min 256 bit, Base64)
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleVRoYXRJc0F0TGVhc3QyNTZCaXRz}
  expiration-ms: 3600000  # 1 ora
  # Chiave separata per tempToken OTP (principio di separazione dei segreti)
# ===== OTP Configuration =====
otp:
  length: 6
  expiration-ms: 300000  # 5 minuti

# ===== RabbitMQ Exchange/Queue names =====
messaging:
  rabbitmq:
    exchange: ecommerce.events
    routing-keys:
      user-registered: user.registered
      user-logout: user.logout

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.ecommerce.auth: DEBUG
    # NON loggare mai credenziali o token
    org.springframework.security: INFO
